<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <header class="text-center mb-10">
            <div class="inline-block p-3 bg-indigo-600 rounded-2xl shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800">English Toolkit</h1>
            <p class="text-slate-500 mt-2">英語学習をサポートする3つのツール</p>
        </header>

        <nav class="space-y-4">
            <!-- Tool 1: Reading Speed -->
            <a href="reading-speed-timer.html" class="group block p-6 bg-white rounded-3xl shadow-sm border border-slate-100 hover:border-indigo-300 hover:shadow-md transition-all active:scale-95">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-blue-100 text-blue-600 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800 text-lg">WPM計測</h2>
                        <p class="text-sm text-slate-500">読書スピード（単語数/分）を測る</p>
                    </div>
                </div>
            </a>

            <!-- Tool 2: Speech Practice -->
            <a href="speech-timer-app.html" class="group block p-6 bg-white rounded-3xl shadow-sm border border-slate-100 hover:border-green-300 hover:shadow-md transition-all active:scale-95">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-green-100 text-green-600 rounded-xl group-hover:bg-green-600 group-hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800 text-lg">1分間スピーチ</h2>
                        <p class="text-sm text-slate-500">録音・文字起こしで練習する</p>
                    </div>
                </div>
            </a>

            <!-- Tool 3: Text to Speech -->
            <a href="english-tts-player.html" class="group block p-6 bg-white rounded-3xl shadow-sm border border-slate-100 hover:border-purple-300 hover:shadow-md transition-all active:scale-95">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-purple-100 text-purple-600 rounded-xl group-hover:bg-purple-600 group-hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                    </div>
                    <div>
                        <h2 class="font-bold text-slate-800 text-lg">英語読み上げ</h2>
                        <p class="text-sm text-slate-500">アメリカ英語で速度調整再生</p>
                    </div>
                </div>
            </a>
        </nav>

        <footer class="mt-12 text-center">
            <p class="text-slate-400 text-xs font-medium uppercase tracking-widest">Powered by Gemini HTML Toolkit</p>
        </footer>
    </div>

</body>
</html>
