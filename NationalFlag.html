<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語学習：国旗めくり対戦ゲーム</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --matched-color: #bdc3c7;
            --active-player-color: #e74c3c;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; color: #333; }
        
        /* 設定画面 */
        .setup-area { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; font-size: 1.1em; }
        input[type="number"] { padding: 8px; width: 60px; border-radius: 5px; border: 1px solid #ccc; font-size: 1em; }
        
        /* ゲームボード */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 110px);
            gap: 15px;
            justify-content: center;
            margin: 20px auto;
            max-width: 900px;
        }

        /* カードの基本デザイン */
        .card {
            width: 110px; height: 140px;
            background-color: var(--primary-color);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; cursor: pointer;
            border-radius: 10px; user-select: none;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card:hover { transform: translateY(-5px); background-color: #2980b9; }

        /* めくった時のデザイン */
        .card.flipped { background-color: white; color: #333; border: 2px solid var(--primary-color); cursor: default; transform: none; }
        
        /* 正解した時のデザイン（消えずに残る） */
        .card.matched {
            background-color: var(--matched-color);
            color: #7f8c8d;
            border: 2px solid #95a5a6;
            cursor: default;
            opacity: 0.8;
            transform: none;
        }
        .card img { width: 85%; height: auto; border-radius: 4px; pointer-events: none; }

        /* スコア表示 */
        .score-board { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .player-info { padding: 15px 25px; border: 2px solid #ddd; border-radius: 10px; background: #fff; transition: all 0.3s; }
        .player-info.active { border-color: var(--active-player-color); background: #fff5f5; box-shadow: 0 0 15px rgba(231, 76, 60, 0.3); transform: scale(1.05); }
        .player-score { font-size: 1.5em; display: block; font-weight: bold; }

        .message { font-size: 1.5em; font-weight: bold; color: var(--success-color); margin: 20px 0; min-height: 1.6em; }
        .hidden { display: none; }
        button { padding: 12px 30px; font-size: 1em; cursor: pointer; background: var(--success-color); color: white; border: none; border-radius: 5px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
    </style>
</head>

        let isProcessing = false; // アニメーション中のクリック防止用

        function startGame() {
            const pCount = parseInt(document.getElementById('player-count').value) || 1;
            totalPairs = parseInt(document.getElementById('pair-count').value) || 1;

            // 登録データ以上の問題数は指定できないように制限
            const maxAvailable = masterList.length;
            if (totalPairs > maxAvailable) {
                alert(`データが足りません。現在は最大 ${maxAvailable} 組までです。`);
                return;
            }

            // 初期化
            players = Array.from({ length: pCount }, (_, i) => ({ id: i + 1, score: 0 }));
            currentPlayerIndex = 0;
            matchedPairs = 0;
            flippedCards = [];
            isProcessing = false;

            // データの準備
            const selected = [...masterList].sort(() => Math.random() - 0.5).slice(0, totalPairs);
            let gameData = [];
            selected.forEach(c => {
                gameData.push({ id: c.id, content: c.image, type: 'image' });
                gameData.push({ id: c.id, content: c.name, type: 'text' });
            });
            gameData.sort(() => Math.random() - 0.5);

            // UI切り替え
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('message').innerText = '';
            
            updateScoreBoard();
            updateTurnDisplay();
            renderBoard(gameData);
        }

        function renderBoard(data) {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = item.id;
                card.dataset.type = item.type;
                card.dataset.content = item.content;
                card.innerText = '?';
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            // クリック防止条件：2枚めくり中、すでにめくられている、すでに正解している
            if (isProcessing || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            // カードの中身を表示
            if (card.dataset.type === 'image') {
                card.innerText = '';
                const img = document.createElement('img');
                img.src = "images/" + card.dataset.content;
                card.appendChild(img);
            } else {
                card.innerText = card.dataset.content;
            }
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                isProcessing = true;
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            if (card1.dataset.id === card2.dataset.id) {
                // 【正解】
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                card1.classList.add('matched');
                card2.classList.add('matched');
                
                players[currentPlayerIndex].score++;
                matchedPairs++;
                
                if (matchedPairs === totalPairs) {
                    showFinalResult();
                } else {
                    document.getElementById('message').innerText = '正解！もう一度めくれます。';
                }
            } else {
                // 【不正解】
                card1.innerText = '?';
                card2.innerText = '?';
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                
                document.getElementById('message').innerText = '残念！交代です。';
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            }

            flippedCards = [];
            isProcessing = false;
            updateScoreBoard();
            updateTurnDisplay();
        }

        function updateScoreBoard() {
            const board = document.getElementById('score-board');
            board.innerHTML = '';
            players.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = `player-info ${index === currentPlayerIndex ? 'active' : ''}`;
                div.innerHTML = `プレイヤー ${p.id}<span class="player-score">${p.score}点</span>`;
                board.appendChild(div);
            });
        }

        function updateTurnDisplay() {
            if (matchedPairs < totalPairs) {
                document.getElementById('turn-display').innerText = `今は プレイヤー ${players[currentPlayerIndex].id} の番です`;
            } else {
                document.getElementById('turn-display').innerText = 'ゲーム終了！';
            }
        }

        function showFinalResult() {
            const maxScore = Math.max(...players.map(p => p.score));
            const winners = players.filter(p => p.score === maxScore).map(p => p.id);
            document.getElementById('message').innerText = `終了！ プレイヤー ${winners.join(' & ')} の勝ちです！`;
        }

        function backToSetup() {
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('game-area').classList.add('hidden');
        }
